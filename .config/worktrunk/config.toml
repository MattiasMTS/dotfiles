skip-shell-integration-prompt = true

[pre-start]
fetch = "git fetch --all --prune --quiet || true"

[post-start]
copy = "wt step copy-ignored"

[pre-remove]
session = """
S="{{ branch | sanitize }}"
if [ -n "$CMUX_WORKSPACE_ID" ]; then
  WS_REF=$(cmux list-workspaces 2>/dev/null | awk -v name="$S" '{ for(i=1;i<=NF;i++) if($i==name) { for(j=1;j<=NF;j++) if($j~/^workspace:/) {print $j; exit} } }')
  if [ -n "$WS_REF" ]; then
    CURRENT=$(cmux current-workspace 2>/dev/null)
    if [ "$CURRENT" = "$WS_REF" ]; then
      cmux previous-window 2>/dev/null || cmux next-window 2>/dev/null || true
    fi
    cmux close-workspace --workspace "$WS_REF" 2>/dev/null || true
  fi
fi
"""

[projects]
