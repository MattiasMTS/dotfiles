# Plugin settings
# resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# yank
set -g @yank_action 'copy-pipe' # instead of copy-pipe-cancel, to not jump to bottom

# catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none" # default / none
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# status style
set -g status-style "bg=default"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[fg=#{@thm_green}]  #S }}"
set -ga status-left "#[fg=#{@thm_overlay_0},none] │ "
set -ga status-left "#[fg=#{@thm_yellow}]#{?window_zoomed_flag, zoom  #[fg=#{@thm_overlay_0}]│ ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@thm_overlay_1}]%H:%M"

set -g status-position bottom

setw -g pane-border-status off
# setw -g pane-border-style "fg=#{@thm_surface_0}"
# setw -g pane-border-lines double
# setw -g pane-border-status top
# setw -g pane-border-format " #{pane_index}: #{pane_current_command} "

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set -g status-justify centre
set -g window-status-format " #I: #W "
set -g window-status-style "fg=#{@thm_overlay_0}"
set -g window-status-last-style "fg=#{@thm_overlay_1}"
set -g window-status-activity-style "fg=#{@thm_red},bold"
set -gF window-status-separator "#[fg=#{@thm_surface_0}]│"

set -g window-status-current-format " #I: #W "
set -g window-status-current-style "fg=#{@thm_peach},bold"

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# kitty graphics protocol (for image in neovim)
set -gq allow-passthrough on
set -g visual-activity off

# use system clipboard
set -g set-clipboard on

# lord forgive me
set -g mouse on
bind -n WheelUpPane if -F '#{mouse_any_flag}' 'send -M' 'if -F "#{alternate_on}" "send-keys Up" "copy-mode -e; send-keys -M"'
bind -n WheelDownPane if -F '#{mouse_any_flag}' 'send -M' 'if -F "#{alternate_on}" "send-keys Down" "send-keys -M"'

# Activity notification
set -g monitor-activity off
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g monitor-bell on
set -g bell-action other

set-option -g focus-events on

# keybindings
bind-key a last-window
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

# Smart pane resizing with awareness of Neovim splits.
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# better session management
bind-key S switch-client -l          # switch to last session
bind-key X kill-session              # kill current session

# tmux sessionizer
bind-key "f" display-popup -E -w 75% -h 75% "tmux-sessionizer"

# reload
bind-key "R" source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# toggle statusline
bind-key b set-option status
